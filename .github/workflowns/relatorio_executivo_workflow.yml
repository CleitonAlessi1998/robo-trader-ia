name: Relatorio Executivo Diario — 7h Brasilia

on:
  schedule:
    # Todo dia util as 7h (Brasilia = UTC-3 portanto 10h UTC)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:   # permite rodar manualmente

jobs:
  relatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Gerar e enviar relatorio executivo
        env:
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        run: python relatorio_executivo.py
